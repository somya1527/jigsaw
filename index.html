<script>
const puzzle = document.getElementById("puzzle");
let tiles = [];
let positions = [];

// Create tiles
for (let i = 0; i < 16; i++) {
    let div = document.createElement("div");
    div.classList.add("tile");

    let x = (i % 4) * 120;
    let y = Math.floor(i / 4) * 120;

    div.style.backgroundPosition = `-${x}px -${y}px`;
    div.dataset.correct = i;

    tiles.push(div);
    positions.push(i); // track positions
}

// Shuffle positions
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

// Start game
function startGame() {
    document.getElementById("start").style.display = "none";
    document.getElementById("puzzleContainer").style.display = "flex";

    shuffle(positions);

    puzzle.innerHTML = "";

    positions.forEach(pos => {
        let tile = tiles[pos];
        puzzle.appendChild(tile);
    });

    tiles.forEach(tile => {
        tile.onclick = () => selectTile(tile);
    });
}

let selected = null;

function selectTile(tile) {
    if (!selected) {
        selected = tile;
        tile.style.border = "2px solid pink";
    } else {
        swapTiles(selected, tile);
        selected.style.border = "none";
        selected = null;
        checkWin();
    }
}

// Swap actual DOM positions
function swapTiles(a, b) {
    let parent = a.parentNode;
    let aIndex = Array.from(parent.children).indexOf(a);
    let bIndex = Array.from(parent.children).indexOf(b);

    if (aIndex < bIndex) {
        parent.insertBefore(b, a);
        parent.insertBefore(a, parent.children[bIndex]);
    } else {
        parent.insertBefore(a, b);
        parent.insertBefore(b, parent.children[aIndex]);
    }
}

// Check win properly
function checkWin() {
    let correct = true;

    Array.from(puzzle.children).forEach((tile, index) => {
        if (parseInt(tile.dataset.correct) !== index) {
            correct = false;
        }
    });

    if (correct) {
        setTimeout(() => {
            document.getElementById("puzzleContainer").style.display = "none";
            let letter = document.getElementById("letter");
            letter.style.display = "block";

            setTimeout(() => {
                letter.classList.add("show");
            }, 100);

        }, 600);
    }
}
</script>

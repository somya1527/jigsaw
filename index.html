<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* START */
#start {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

button {
    padding: 12px 24px;
    border: none;
    background: #ffccd5;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

/* PUZZLE */
#puzzleContainer {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#puzzle {
    display: grid;
    grid-template-columns: repeat(4, 120px);
    grid-template-rows: repeat(4, 120px);
    gap: 2px;
}

.tile {
    width: 120px;
    height: 120px;
    background-image: url('letter.jpg');
    background-size: 480px 480px;
    cursor: pointer;
    border-radius: 4px;
    transition: transform 0.2s;
}

.tile:hover {
    transform: scale(1.05);
}

/* LETTER */
#letter {
    display: none;
    padding: 60px;
    max-width: 800px;
    margin: auto;
    line-height: 1.7;
    opacity: 0;
    transition: opacity 2s;
}

.show {
    opacity: 1;
}
</style>
</head>

<body>

<div id="start">
    <h2>Take your time with this…</h2>
    <button onclick="startGame()">Start</button>
</div>

<div id="puzzleContainer">
    <h3>Put it back together</h3>
    <div id="puzzle"></div>
</div>

<div id="letter">
    <h1>Happy 7 Years ❤️</h1>
    <p>PASTE YOUR LETTER HERE</p>
</div>

<script>
const puzzle = document.getElementById("puzzle");
let tiles = [];

for (let i = 0; i < 16; i++) {
    let div = document.createElement("div");
    div.classList.add("tile");

    let x = (i % 4) * 120;
    let y = Math.floor(i / 4) * 120;

    div.style.backgroundPosition = `-${x}px -${y}px`;
    div.dataset.correct = i;

    tiles.push(div);
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

function startGame() {
    document.getElementById("start").style.display = "none";
    document.getElementById("puzzleContainer").style.display = "flex";

    shuffle(tiles);
    tiles.forEach(tile => puzzle.appendChild(tile));

    tiles.forEach(tile => {
        tile.onclick = () => selectTile(tile);
    });
}

let selected = null;

function selectTile(tile) {
    if (!selected) {
        selected = tile;
        tile.style.border = "2px solid pink";
    } else {
        swapTiles(selected, tile);
        selected.style.border = "none";
        selected = null;
        checkWin();
    }
}

function swapTiles(a, b) {
    let temp = a.style.backgroundPosition;
    a.style.backgroundPosition = b.style.backgroundPosition;
    b.style.backgroundPosition = temp;
}

function checkWin() {
    let correct = 0;

    tiles.forEach((tile) => {
        let correctX = (tile.dataset.correct % 4) * 120;
        let correctY = Math.floor(tile.dataset.correct / 4) * 120;

        if (tile.style.backgroundPosition === `-${correctX}px -${correctY}px`) {
            correct++;
        }
    });

    if (correct === 16) {
        setTimeout(() => {
            document.getElementById("puzzleContainer").style.display = "none";
            let letter = document.getElementById("letter");
            letter.style.display = "block";

            setTimeout(() => {
                letter.classList.add("show");
            }, 100);

        }, 800);
    }
}
</script>

</body>
</html>
